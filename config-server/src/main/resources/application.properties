spring.application.name=config-server

server.port=8888

# Using Native (File-based) Profile for Development
# This allows serving configuration files from the classpath or file system
spring.profiles.active=native
spring.cloud.config.server.native.search-locations=classpath:/config,file:///C:/agms-config

# Git Repository Configuration (Uncomment for production with Git)
# spring.cloud.config.server.git.uri=https://github.com/your-username/agms-config-repo.git
# spring.cloud.config.server.git.default-label=main
# spring.cloud.config.server.git.clone-on-start=true

# Actuator endpoints for health checks
management.endpoints.web.exposure.include=health,info