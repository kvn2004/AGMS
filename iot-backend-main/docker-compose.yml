services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-iot
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: IoT@Secure#2026!DB
      MYSQL_DATABASE: iot_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  redis-cache:
    image: redis:alpine
    container_name: redis-iot
    restart: always
    ports:
      - "6379:6379"

  iot-app:
    image: shamodha/iot-backend:latest
    container_name: iot-service-app
    pull_policy: always
    restart: always
    depends_on:
      - mysql-db
      - redis-cache
    ports:
      - "8080:8080"
    environment:
      SPRING_R2DBC_URL: r2dbc:mysql://mysql-db:3306/iot_db
      SPRING_R2DBC_USERNAME: root
      SPRING_R2DBC_PASSWORD: IoT@Secure#2026!DB
      SPRING_DATA_REDIS_HOST: redis-cache
