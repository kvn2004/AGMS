server:
  port: 8080

spring:
  application:
    name: api-gateway
  config:
    import: optional:configserver:http://localhost:8888
  cloud:
    gateway:
      routes:
        - id: zone-service
          uri: lb://zone-service
          predicates:
            - Path=/api/zones/**
          filters:
            - JwtAuthenticationFilter
        
        - id: sensor-telemetry-service
          uri: lb://sensor-telemetry-service
          predicates:
            - Path=/api/sensors/**
          filters:
            - JwtAuthenticationFilter
        
        - id: automation-control-service
          uri: lb://automation-control-service
          predicates:
            - Path=/api/automation/**
          filters:
            - JwtAuthenticationFilter
        
        - id: crop-inventory-service
          uri: lb://crop-inventory-service
          predicates:
            - Path=/api/crops/**
          filters:
            - JwtAuthenticationFilter
    
    eureka:
      client:
        service-url:
          defaultZone: http://localhost:8761/eureka

  jpa:
    hibernate:
      ddl-auto: update

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# JWT Secret Configuration
jwt:
  secret: agms-secure-key-minimum-256-bits-long-for-hs256-algorithm-2026